<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <?!= include('styles'); ?>
</head>
<body>
  <div id="iphone-se-container">
    <div class="header-main">
      <div style="font-weight:500; font-size:16px; color:var(--google-blue);">ANCHOR v10.1.0</div>
      <span class="material-symbols-outlined header-sync-btn" onclick="runDiscovery()">directory_sync</span>
    </div>

    <div class="header-status-row">
      <div style="display:flex;align-items:center;"><div class="status-light"></div><span style="font-size:9px;margin-left:6px;color:var(--text-light);">MODEL</span></div>
      <div style="display:flex;align-items:center;"><span style="font-size:9px;margin-right:6px;color:var(--text-light);">REPO</span><div class="status-light"></div></div>
    </div>

    <div class="btn-row" id="agent-row"></div>

    <div class="btn-row" style="padding-top:0;">
      <div style="display:flex; justify-content: space-between; flex: 1;">
        <button class="active" onclick="setFormat('chat', this)">chat</button>
        <button onclick="setFormat('txt', this)">txt</button>
        <button onclick="setFormat('csv', this)">csv</button>
        <button onclick="setFormat('json', this)">json</button>
      </div>
    </div>

    <div id="chat-feed"></div>

    <div class="footer">
      <div id="topic-row" class="footer-row hidden" style="margin-top:0;">
        <div style="width:24px;"></div>
        <div class="input-container" style="background:transparent; border:1px solid var(--border);"><input type="text" id="topic-input" placeholder="Topic" style="padding: 8px 0;"></div>
        <div style="width:24px;"></div>
      </div>
      <div class="footer-row">
        <span class="material-symbols-outlined" style="color:var(--google-blue);" onclick="clearFeed()">clear_all</span>
        <div class="input-container"><input type="text" id="msg-input" placeholder="Loading..." onkeypress="if(event.key==='Enter') sendMessage()"></div>
        <span class="material-symbols-outlined" style="color:var(--google-blue);" onclick="sendMessage()">send</span>
      </div>
      <div id="thinking" class="thinking-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <script>
    const UI_VERSION = 'v10.1.0'; 
    let activeAgent = ''; let activeId = ''; let activeFormat = 'chat';

    function initAgentButtons() {
      google.script.run.withSuccessHandler(agents => {
        const container = document.getElementById('agent-row');
        container.innerHTML = ''; 
        agents.forEach((agent, index) => {
          const btn = document.createElement('button');
          if (index === 0) { btn.classList.add('active'); activeAgent = agent.name; activeId = agent.id; }
          btn.onclick = () => setAgent(agent.name, agent.id, btn);
          btn.innerHTML = '<span class="material-symbols-outlined">' + agent.icon + '</span>';
          container.appendChild(btn);
        });
        document.getElementById('msg-input').placeholder = "Message " + activeAgent;
      }).getAgentConfig();
    }

    function runDiscovery() {
      document.getElementById('thinking').style.visibility = "visible";
      google.script.run.withSuccessHandler(res => {
        document.getElementById('thinking').style.visibility = "hidden";
        addBubble(res, 'received');
        initAgentButtons();
      }).RECONCILE_VAULT_MAP();
    }

    function clearFeed() {
      document.getElementById('chat-feed').innerHTML = '';
      addBubble("Message feed cleared.", "received");
    }

    function setAgent(name, id, btn) {
      activeAgent = name; activeId = id;
      document.querySelectorAll('#agent-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('msg-input').placeholder = "Message " + name;
    }

    function setFormat(type, btn) {
      activeFormat = type;
      document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const topicRow = document.getElementById('topic-row');
      type === 'chat' ? topicRow.classList.add('hidden') : topicRow.classList.remove('hidden');
    }

    function addBubble(text, type) {
      const feed = document.getElementById('chat-feed');
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      bubble.innerText = text;
      feed.appendChild(bubble);
      feed.scrollTop = feed.scrollHeight;
    }

    function sendMessage() {
      const msg = document.getElementById('msg-input').value;
      if (!msg) return;
      addBubble(msg, 'sent');
      document.getElementById('msg-input').value = "";
      document.getElementById('thinking').style.visibility = "visible";
      google.script.run.withSuccessHandler(res => {
        document.getElementById('thinking').style.visibility = "hidden";
        addBubble(res.response || "Success", "received");
      }).processMessage({ agent: activeAgent, id: activeId, format: activeFormat, topic: document.getElementById('topic-input').value, message: msg });
    }

    window.onload = initAgentButtons;
  </script>
</body>
</html>
