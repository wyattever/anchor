<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <?!= include('styles'); ?>
</head>
<body>
  <div id="iphone-se-container">
    <div class="header-consolidated">
      <div class="status-group">
        <div class="status-light"></div>
        <span class="status-label">MODEL</span>
      </div>
      <div class="header-title">ANCHOR v10.1.7</div>
      <div class="status-group">
        <span class="status-label">VAULT</span>
        <div class="status-light"></div>
      </div>
    </div>

    <div class="btn-row">
      <div id="agent-row" style="display:flex; gap:8px; flex:1;"></div>
      <div class="agent-sync-btn" onclick="runDiscovery()">
        <span class="material-symbols-outlined">directory_sync</span>
      </div>
    </div>

    <div class="btn-row" style="padding-top:0;">
      <div style="display:flex; justify-content: space-between; flex: 1; gap:6px;">
        <button class="active" onclick="setFormat('chat', this)">chat</button>
        <button onclick="setFormat('txt', this)">txt</button>
        <button onclick="setFormat('csv', this)">csv</button>
        <button onclick="setFormat('json', this)">json</button>
      </div>
    </div>

    <div id="chat-feed"></div>

    <div class="footer">
      <div id="topic-row" class="footer-row hidden" style="margin-top:0;">
        <div style="width:24px;"></div>
        <div class="input-container" style="background:transparent; border:1px solid var(--border);"><input type="text" id="topic-input" placeholder="Topic" style="padding: 8px 0;"></div>
        <div style="width:24px;"></div>
      </div>
      <div class="footer-row">
        <span class="material-symbols-outlined" style="color:var(--google-blue);" onclick="clearFeed()">clear_all</span>
        <div class="input-container"><input type="text" id="msg-input" placeholder="Loading..." onkeypress="if(event.key==='Enter') sendMessage()"></div>
        <span class="material-symbols-outlined" style="color:var(--google-blue);" onclick="sendMessage()">send</span>
      </div>
      <div id="thinking" class="thinking-row"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    </div>
  </div>

  <script>
    const UI_VERSION = 'v10.1.7';
    let activeAgent = ''; let activeId = ''; let activeFormat = 'chat';

    function initAgentButtons() {
      google.script.run.withSuccessHandler(agents => {
        const container = document.getElementById('agent-row');
        container.innerHTML = '';
        agents.forEach((agent, index) => {
          const btn = document.createElement('button');
          if (index === 0) { btn.classList.add('active'); activeAgent = agent.name; activeId = agent.id; }
          btn.onclick = () => setAgent(agent.name, agent.id, btn);
          btn.innerHTML = '<span class="material-symbols-outlined">' + agent.icon + '</span>';
          container.appendChild(btn);
        });
        document.getElementById('msg-input').placeholder = "Message " + activeAgent;
      }).getAgentConfig();
    }

    function runDiscovery() {
      document.getElementById('thinking').style.visibility = "visible";
      google.script.run.withSuccessHandler(res => {
        document.getElementById('thinking').style.visibility = "hidden";
        addBubble(res, 'received');
        initAgentButtons();
      }).RECONCILE_VAULT_MAP();
    }

    function clearFeed() {
      document.getElementById('chat-feed').innerHTML = '';
    }

    function setAgent(name, id, btn) {
      activeAgent = name; activeId = id;
      document.querySelectorAll('#agent-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('msg-input').placeholder = "Message " + name;
    }

    function setFormat(type, btn) {
      activeFormat = type;
      document.querySelectorAll('.btn-row button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const topicRow = document.getElementById('topic-row');
      type === 'chat' ? topicRow.classList.add('hidden') : topicRow.classList.remove('hidden');
    }

    function addBubble(text, type, isHtml = false) {
      const feed = document.getElementById('chat-feed');
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + type;
      if (isHtml) {
        bubble.innerHTML = text;
      } else {
        bubble.innerText = text;
      }
      feed.appendChild(bubble);
      feed.scrollTop = feed.scrollHeight;
    }

    function handleSlashCommand(cmd, folderId) {
      const filterMap = {
        '/list-txt':  'txt',
        '/list-csv':  'csv',
        '/list-json': 'json',
        '/list-all':  null
      };

      if (!(cmd in filterMap)) {
        addBubble('Unknown command: ' + cmd, 'received');
        return;
      }

      document.getElementById('thinking').style.visibility = "visible";

      google.script.run.withSuccessHandler(res => {
        document.getElementById('thinking').style.visibility = "hidden";

        if (res.status !== 'OK' || !res.files) {
          addBubble('Error: ' + (res.message || 'Unknown error'), 'received');
          return;
        }

        if (res.files.length === 0) {
          const ext = filterMap[cmd] ? '.' + filterMap[cmd] : '';
          addBubble('No ' + (ext || '') + ' files found in ' + activeAgent + "'s folder.", 'received');
          return;
        }

        const lines = res.files.map(f =>
          '<a href="https://drive.google.com/file/d/' + f.fileId + '/view" target="_blank">' +
          f.name + '</a>'
        );
        addBubble(lines.join('<br>'), 'received', true);

      }).withFailureHandler(err => {
        document.getElementById('thinking').style.visibility = "hidden";
        addBubble('Error: ' + err.message, 'received');
      }).listFiles({ folderId: folderId, filter: filterMap[cmd] });
    }

    function sendMessage() {
      const msg   = document.getElementById('msg-input').value.trim();
      const topic = document.getElementById('topic-input').value.trim();
      if (!msg) return;

      // ── Slash command intercept ───────────────────────────────────────────
      if (msg.startsWith('/')) {
        addBubble(msg, 'sent');
        document.getElementById('msg-input').value = "";
        handleSlashCommand(msg.toLowerCase(), activeId);
        return;
      }

      // ── Normal message flow ───────────────────────────────────────────────
      addBubble(msg, 'sent');
      document.getElementById('msg-input').value   = "";
      document.getElementById('topic-input').value = "";
      document.getElementById('thinking').style.visibility = "visible";

      google.script.run.withSuccessHandler(res => {
        document.getElementById('thinking').style.visibility = "hidden";
        if (res && res.status === 'OK' && res.fileId && res.name) {
          const url  = 'https://drive.google.com/file/d/' + res.fileId + '/view';
          const html = '<a href="' + url + '" target="_blank">' + res.name + '</a> created.';
          addBubble(html, 'received', true);
        } else if (res && res.status === 'OK' && res.response) {
          addBubble(res.response, 'received');
        } else {
          addBubble('Error: ' + JSON.stringify(res), 'received');
        }
      }).withFailureHandler(err => {
        document.getElementById('thinking').style.visibility = "hidden";
        addBubble('Error: ' + err.message, 'received');
      }).processMessage({
        agent:   activeAgent,
        id:      activeId,
        format:  activeFormat,
        topic:   topic,
        message: msg
      });
    }

    window.onload = initAgentButtons;
  </script>
</body>
</html>
