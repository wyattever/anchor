<style>
 :root {
   --bg: #FFFFFF;
   --surface: #F1F3F4;
   --border: #DADCE0;
   --google-blue: #1A73E8;
   --text: #3C4043;
   --text-light: #70757A;
   --success-green: #34A853;
 }
 * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 
 html, body {
   background: #E8EAED;
   margin: 0;
   padding: 0;
   display: flex;
   flex-direction: column;
   align-items: center;
   /* Use dynamic viewport height to account for mobile browser bars */
   height: 100vh;
   height: 100dvh; 
   overflow: hidden;
   font-family: 'Google Sans', Roboto, Helvetica, Arial, sans-serif;
 }

 #iphone-se-container {
   width: 100%;
   max-width: 375px;
   /* Subtract the 20px top margin and a bottom buffer for Safari */
   height: calc(100dvh - 40px); 
   margin-top: 20px;
   background: var(--bg);
   display: flex;
   flex-direction: column;
   position: relative;
   box-shadow: 0 12px 28px rgba(0,0,0,0.15);
   border: 1px solid var(--border);
   border-radius: 12px 12px 0 0;
   overflow: hidden;
 }

 .header-consolidated {
   padding: 12px 16px;
   display: flex;
   align-items: center;
   justify-content: space-between;
   border-bottom: 1px solid var(--border);
   background: var(--bg);
   position: relative;
   flex-shrink: 0;
 }

 .status-group { display: flex; align-items: center; gap: 6px; min-width: 60px; }
 .status-light { width: 7px; height: 7px; border-radius: 50%; background: var(--success-green); }
 .status-label { font-size: 8px; color: var(--text-light); font-weight: 700; letter-spacing: 0.5px; }

 .header-title {
   position: absolute;
   left: 50%;
   transform: translateX(-50%);
   font-weight: 500;
   font-size: 13px;
   color: var(--google-blue);
   white-space: nowrap;
 }

 .header-sync-btn {
   cursor: pointer;
   color: var(--google-blue);
   font-size: 18px !important;
   margin-right: 12px;
 }

 .btn-row {
   display: flex;
   align-items: center;
   justify-content: space-between;
   padding: 10px 16px;
   gap: 6px;
   flex-shrink: 0;
 }
 .btn-row button {
   background: var(--bg);
   border: 1px solid var(--border);
   color: var(--text-light);
   border-radius: 20px;
   padding: 6px 0;
   font-size: 10px;
   font-weight: 500;
   flex: 1;
   cursor: pointer;
 }
 .btn-row button.active {
   background: #E8F0FE;
   color: var(--google-blue);
   border-color: var(--google-blue);
 }

 #chat-feed {
   flex: 1;
   overflow-y: auto;
   padding: 12px;
   display: flex;
   flex-direction: column;
   gap: 10px;
   background: #F8F9FA;
   /* Smooth scrolling for iOS */
   -webkit-overflow-scrolling: touch;
 }
 .bubble {
   padding: 10px 14px;
   border-radius: 18px;
   font-size: 13px;
   line-height: 1.4;
   border: 1px solid var(--border);
   max-width: 85%;
   word-wrap: break-word;
 }
 .sent { background: var(--surface); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }
 .received { background: #FFFFFF; color: var(--google-blue); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

 .footer {
   padding: 8px 12px 12px 12px;
   background: var(--bg);
   border-top: 1px solid var(--border);
   flex-shrink: 0;
 }
 .input-container {
   background: var(--surface);
   border-radius: 24px;
   padding: 0 14px;
   display: flex;
   align-items: center;
   flex: 1;
 }
 input {
   flex: 1;
   background: transparent;
   border: none;
   padding: 10px 0;
   color: var(--text);
   font-size: 14px;
   outline: none;
 }
 .footer-row { display: flex; align-items: center; gap: 10px; width: 100%; }
 .material-symbols-outlined { font-size: 20px; cursor: pointer; user-select: none; }
 .hidden { display: none !important; }

 .thinking-row {
   display: flex;
   justify-content: center;
   padding: 4px 0;
   visibility: hidden;
   height: 12px;
 }
 .dot {
   width: 4px; height: 4px; background: var(--google-blue); border-radius: 50%; margin: 0 2px; animation: pulse 1.5s infinite ease-in-out;
 }
 @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
