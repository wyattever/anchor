<style>
 :root {
   --bg: #FFFFFF;
   --surface: #F1F3F4;
   --border: #DADCE0;
   --google-blue: #1A73E8;
   --text: #3C4043;
   --text-light: #70757A;
   --success-green: #34A853;
 }
 * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
 html, body {
   background: #E8EAED;
   margin: 0;
   padding: 0;
   display: flex;
   justify-content: center;
   align-items: center;
   height: 100vh;
   overflow: hidden;
   font-family: 'Google Sans', Roboto, Helvetica, Arial, sans-serif;
 }

 #iphone-se-container {
   width: 375px;
   height: 667px;
   margin: 50px 0; /* 50px Top and Bottom Margin */
   background: var(--bg);
   display: flex;
   flex-direction: column;
   position: relative;
   box-shadow: 0 12px 28px rgba(0,0,0,0.15);
   border: 1px solid var(--border);
   overflow: hidden;
 }

 .header-main {
   padding: 16px 16px 8px 16px;
   display: flex;
   justify-content: center;
   align-items: center;
   background: var(--bg);
 }

 .header-status-row {
   padding: 0 20px 12px 20px;
   display: flex;
   justify-content: space-between;
   align-items: center;
   border-bottom: 1px solid var(--border);
 }

 .header-sync-btn {
   cursor: pointer;
   color: var(--google-blue);
   font-size: 22px !important;
   margin-left: 50px; /* Specific 50px Offset */
 }

 .status-light { width: 8px; height: 8px; border-radius: 50%; background: var(--success-green); }
 
 .btn-row {
   display: flex;
   align-items: center;
   justify-content: space-between;
   padding: 12px 20px;
   gap: 8px;
 }
 .btn-row button {
   background: var(--bg);
   border: 1px solid var(--border);
   color: var(--text-light);
   border-radius: 20px;
   padding: 8px 12px;
   font-size: 11px;
   font-weight: 500;
   display: flex;
   align-items: center;
   justify-content: center;
   flex: 1;
   transition: all 0.2s ease;
   cursor: pointer;
 }
 .btn-row button.active {
   background: #E8F0FE;
   color: var(--google-blue);
   border-color: var(--google-blue);
 }

 #chat-feed {
   flex: 1;
   overflow-y: auto;
   padding: 16px;
   display: flex;
   flex-direction: column;
   gap: 12px;
   background: #F8F9FA;
 }
 .bubble {
   padding: 12px 16px;
   border-radius: 18px;
   font-size: 14px;
   line-height: 1.5;
   border: 1px solid var(--border);
   max-width: 85%;
 }
 .sent { background: var(--surface); color: var(--text); align-self: flex-end; border-bottom-right-radius: 4px; }
 .received { background: #FFFFFF; color: var(--google-blue); align-self: flex-start; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

 .footer {
   padding: 8px 16px 24px 16px;
   background: var(--bg);
   border-top: 1px solid var(--border);
 }
 .input-container {
   background: var(--surface);
   border-radius: 24px;
   padding: 0 16px;
   display: flex;
   align-items: center;
   flex: 1;
 }
 input {
   flex: 1;
   background: transparent;
   border: none;
   padding: 12px 0;
   color: var(--text);
   font-size: 14px;
   outline: none;
 }
 .footer-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; width: 100%; }
 .material-symbols-outlined { font-size: 22px; cursor: pointer; user-select: none; }
 .hidden { display: none !important; }

 .thinking-row {
   display: flex;
   justify-content: center;
   padding: 10px 0;
   visibility: hidden;
   height: 20px;
 }
 .dot {
   width: 6px; height: 6px; background: var(--google-blue); border-radius: 50%; margin: 0 3px; animation: pulse 1.5s infinite ease-in-out;
 }
 @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
